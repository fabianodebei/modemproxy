{% extends "base.html" %}
{% block title %}Sign in · {{ brand().name }}{% endblock %}
{% block body %}
<div class="min-h-screen grid place-items-center px-4">
  <div class="w-full max-w-sm">
    <div class="flex items-center gap-3 mb-8 justify-center">
      <div class="h-10 w-10 rounded-xl bg-brand-500/15 grid place-items-center">
        <svg class="h-6 w-6 text-brand-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round"/>
          <circle cx="7" cy="7" r="1.4" fill="currentColor"/>
          <circle cx="7" cy="12" r="1.4" fill="currentColor"/>
          <circle cx="7" cy="17" r="1.4" fill="currentColor"/>
        </svg>
      </div>
      <h1 class="text-xl font-semibold tracking-tight">{{ brand().name }}</h1>
    </div>

    <form method="post" action="/panel/login"
          class="bg-ink-800 border border-ink-600 rounded-2xl p-6 shadow-xl space-y-4">
      <h2 class="text-sm font-medium text-slate-400">Customer area</h2>
      {% if error %}
      <div class="text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2">
        {{ error }}
      </div>
      {% endif %}
      <div>
        <label class="block text-xs text-slate-400 mb-1">Username</label>
        <input name="username" autofocus autocomplete="username"
               class="w-full bg-ink-700 border border-ink-600 rounded-lg px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-brand-500/60">
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">Password</label>
        <input name="password" type="password" autocomplete="current-password"
               class="w-full bg-ink-700 border border-ink-600 rounded-lg px-3 py-2 text-sm
                      focus:outline-none focus:ring-2 focus:ring-brand-500/60">
      </div>
      <button class="w-full bg-brand-500 hover:bg-brand-600 transition text-white
                     font-medium rounded-lg px-3 py-2 text-sm">Sign in</button>
    </form>
    <p class="text-center text-xs text-slate-600 mt-4">{{ brand().company or brand().name }}</p>
  </div>
</div>
{% endblock %}
